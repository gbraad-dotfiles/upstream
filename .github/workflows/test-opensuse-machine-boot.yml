name: Test OpenSUSE machine boot

on:
  workflow_dispatch:
    inputs:
      image_url:
        description: "Cloud image URL to test"
        required: false
        default: "https://download.opensuse.org/tumbleweed/appliances/openSUSE-Tumbleweed-Minimal-VM.x86_64-Cloud-NoCloud.qcow2"


jobs:
  test-boot:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Get last 3 chars of hostname
        id: runner_id
        run: |
          echo "last3=${HOSTNAME: -3}" >> $GITHUB_OUTPUT

      - name: Tailscale setup (host)
        uses: gbraad-actions/tailscale-action@v1
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          args: --ssh --accept-dns=false --operator=runner --advertise-exit-node
          hostname: "opensuse-boot-${{ steps.runner_id.outputs.last3 }}"

      - name: Dotfiles (install from action)
        uses: gbraad-dotfiles/install-action@main
        with:
          upstream: true

      - name: Write machinekey
        uses: gbraad-dotfiles/machinekey-action@main
        with:
          ssh_private_key: ${{ secrets.SSH_MACHINE_PRIVATE }}
          ssh_public_key: ${{ secrets.SSH_MACHINE_PUBLIC }}

      - name: Install required virtualization software
        uses: gbraad-actions/setup-virtualization@v2

      - name: Install macadam
        uses: gbraad-actions/zsh-action@main
        with:
          as_user: runner
          run: |
            app macadam install

      - name: Enable macadam debug logging
        run: |
          git config -f ~/.config/dotfiles/local/machine.ini machine.debug true

      - name: Download cloud image
        uses: gbraad-actions/zsh-action@main
        with:
          as_user: runner
          run: |
            mkdir -p ~/DiskImages
            machine opensuse-cloud download

      - name: Init VM
        uses: gbraad-actions/zsh-action@main
        with:
          as_user: runner
          run: |
            machine test-boot from-image ~/DiskImages/opensuse-cloud.qcow2

      - name: Wait for VM and check SSH
        run: |
          echo "Waiting 60s for cloud-init to complete..."
          sleep 60

          PORT=$(jq -r '.SSH.Port' ~/.config/containers/macadam/machine/qemu/machine-test-boot.json)
          USER=$(jq -r '.SSH.RemoteUsername' ~/.config/containers/macadam/machine/qemu/machine-test-boot.json)
          KEY=$(jq -r '.SSH.IdentityPath' ~/.config/containers/macadam/machine/qemu/machine-test-boot.json)

          echo "Attempting SSH: user=${USER} port=${PORT} key=${KEY}"
          ssh -v -i "${KEY}" -p "${PORT}" \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            ${USER}@localhost \
            "cat /etc/os-release && cloud-init status --long" \
            || echo "SSH failed"

      - name: Show macadam logs on failure
        if: always()
        run: |
          echo "=== macadam machine list ==="
          macadam list || true
          echo "=== machine json config ==="
          cat ~/.config/containers/macadam/machine/qemu/machine-test-boot.json 2>/dev/null || true
          echo "=== journalctl (host) ==="
          sudo journalctl -n 50 --no-pager || true

      - name: Hang around
        if: always()
        run: |
          IP=$(tailscale ip -4)
          echo "Connect with: tailscale ssh runner@${IP}"
          sleep 18000

      - name: Message user; 1 hour
        if: always()
        run: |
          sudo wall "about 1 hour remaining"
          sleep 3600

      - name: Stop and remove VM
        if: always()
        uses: gbraad-actions/zsh-action@main
        with:
          as_user: runner
          run: |
            machine test-boot stop 2>/dev/null || true
            machine test-boot remove 2>/dev/null || true
